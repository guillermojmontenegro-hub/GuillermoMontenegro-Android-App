name: Android CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Lint, unit test, and compile app plus androidTest
        run: ./gradlew lint testDebugUnitTest assembleDebug :app:assembleDebugAndroidTest

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cv-guillermo-montenegro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
